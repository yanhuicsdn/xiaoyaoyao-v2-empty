# 完整部署（包含内置 PostgreSQL + Redis）
# 使用方式：kubectl apply -k overlays/with-infra/

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: skillhub

resources:
  - postgres-statefulset.yaml
  - redis-statefulset.yaml
  - ../../base

labels:
  - pairs:
      app.kubernetes.io/deployment: with-infra
